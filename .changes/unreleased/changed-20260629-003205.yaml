kind: Changed
body: '`Tag::new` is now `#[inline]`, allowing the per-field-write call in generated `write_to` code to inline in optimized builds without LTO (cargo''s default release profile). Measured up to ~13% fewer encode instructions on encode-heavy workloads. No API change. (#257)'
