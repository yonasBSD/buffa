# Pin the development toolchain so local builds and the CI lint job format
# and lint identically. rustfmt output drifts across releases even with
# default settings (e.g. import ordering of `__`-prefixed modules changed
# between rustfmt 1.7 and 1.9), so an unpinned local rustfmt can silently
# reformat code that CI then rejects — or vice versa. rustfmt's own
# `required_version` knob is nightly-only, so the pin lives here instead.
#
# Keep in sync with the pinned dtolnay/rust-toolchain versions in
# .github/workflows/ci.yml (lint-and-test, check-nostd); bump together. The
# MSRV check (rust-version in Cargo.toml, currently 1.75) deliberately opts
# out of this file via RUSTUP_TOOLCHAIN in its CI job.
#
# The channel must be the full X.Y.Z version: rustup treats "1.95" and
# "1.95.0" as two distinct toolchain installations, so a bare "1.95" here
# splits from the "1.95.0" the CI action installs its targets/components
# onto, and cross-target jobs fail with E0463.
[toolchain]
channel = "1.95.0"
components = ["rustfmt", "clippy"]
