[package]
name = "conformance"
description = "Protobuf conformance test runner for buffa"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "Apache-2.0"
publish = false

# Intentionally NOT in the root workspace — this crate requires proto files
# in conformance/protos/ that are generated by the Docker build or via
# `task fetch-protos`. Keeping it standalone prevents the workspace lint and
# test targets from failing on machines where the protos have not been
# fetched.
#
# Build inside Docker:
#   task conformance
#
# Build locally (after fetching protos):
#   task fetch-protos
#   cargo build --manifest-path conformance/Cargo.toml

# Prevent cargo from treating this as part of the parent workspace.
[workspace]

[features]
default = ["buffa-std"]
# `reflect` enables vtable-mode reflection on the generated view types and the
# WKT views (BUFFA_VIA_VTABLE run). It requires std, so it rides on `buffa-std`
# (the default) and is absent from the `--no-default-features` no_std binary —
# whose generated code therefore omits the reflect impls.
buffa-std = ["buffa/std", "buffa-types/std", "reflect"]
reflect = ["buffa-types/reflect"]

[dependencies]
buffa = { path = "../buffa", default-features = false, features = ["json", "text"] }
buffa-types = { path = "../buffa-types", default-features = false, features = ["json"] }
buffa-descriptor = { path = "../buffa-descriptor", default-features = false, features = ["reflect", "json", "std"] }
serde = { version = "1", features = ["derive"] }
serde_json = { version = "1", features = ["std", "float_roundtrip"] }

[build-dependencies]
buffa-build = { path = "../buffa-build" }
